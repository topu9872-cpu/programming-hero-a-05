<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <!-- tailwind & daisyui -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


<!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
 integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
  crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class=" grid col-span-1 w-full">
    <section class="flex justify-between w-11/12 mx-auto pt-4">
        <div class="flex space-x-2">
            <img class="w-8" src="./assets/github-logo.png">
            <h2 class="text-3xl font-bold ">All Issues</h2>
        </div>
        <div>
            <div class="join">
  <div>
    <label class="input validator join-item">
     <input id="searchInput" type="text" placeholder="Search Issues" />
    </label>
  </div>
  <button id="searchBtn" class="btn btn-primary join-item ">Search</button>
</div>
        </div>
    </section>
<section class="flex space-x-5 w-11/12 mx-auto pt-4 ">
   <button id="all-btn" onclick="togglestyle('all-btn')" class="btn btn-outline btn-primary bg-blue-800 text-white hover:text-white">All</button>
   <button id="open-btn"  onclick="togglestyle('open-btn')" class="btn btn-outline btn-primary bg-blue-800 text-white hover:text-white">Open</button>
   <button id="closed-btn"  onclick="togglestyle('closed-btn')" class="btn btn-outline btn-primary bg-blue-800 text-white hover:text-white">Closed</button>
</section>
<section class="flex justify-between w-11/12 mx-auto pt-4 border border-gray-300 p-10 rounded-md align-center mt-10">
    <div class="flex pt-6">
        <div class="pt-2"><img src="./assets/Aperture.png" width="40rem"></div>
        <div>
            <h3 id="totalCards" class="pl-4 font-bold text-2xl "></h3>
            <p class="pl-4 text-gray-500">Track and manage your project issues</p>
        </div>
    </div>
    <div class="flex gap-5 pt-8">
         <p class=" flex p-2"><img src="./assets/Open-Status.png">Open</p>
        <p class=" flex p-2"><img src="./assets/Closed- Status .png">Closed</p>
    </div>
</section> 

<section id="span" class="flex justify-center mx-auto">
   <span class="loading loading-infinity loading-xl"></span>
</section>

<section id="allCardSection" class=" grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 justify-between w-11/12 gap-5 mx-auto pt-4 bg-gray-100 pb-20 "></section>
<section id="openCardSection" class=" grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 justify-between w-11/12 gap-5 mx-auto pt-4 bg-gray-100 pb-20"></section>
<section id="closeCardSection" class=" grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 justify-between w-11/12 gap-5 mx-auto pt-4 bg-gray-100 pb-20"></section>

 
 <div id="modalContainer"></div>

<script src="./home.js"></script>
</body>
</html>
