<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- tailwind & daisyui -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
 integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
  crossorigin="anonymous" referrerpolicy="no-referrer" />
   
</head>
<body>

<fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 mt-10  mx-auto">
    <div class="mx-auto space-y-5">
        <img class="mx-auto" src="./assets/github-logo.png">
  <legend class="fieldset-legend flex justify-center mx-auto text-3xl font-bold whitespace-nowrap">GitHub Issues Tracker</legend>
  <p class="mx-auto flex justify-center text-sm text-gray-500">Sing in to manage Your Issues</p>
</div>
  <label class="label text-sm">Username</label>
  <input id="get-input" type="email" class="input" placeholder="Enter Your Username" required/>

  <label class="label text-sm">Password</label>
  <input id="get-password" type="password" class="input" placeholder="Password" required />

  <button id="login-btn" class="btn btn-primary mt-4">Login</button>
</fieldset>
    <script src="./index.js"></script>
</body>
</html>
